Name: Xinference
Id: xinference
Category: local_llm
Vendor: Xorbits
Description: Distributed model inference platform. Local supervisor entrypoint is
  `xinference-local` (not `xinference serve`). Client CLI is `xinference` with launch/list/chat
  subcommands. Default home ~/.xinference (override XINFERENCE_HOME).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - xinference
  - xinference-local
  - xinference.exe
  - xinference-local.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Local
  Website: https://inference.readthedocs.io/
  OfficialUrl: https://inference.readthedocs.io/
  CliExecutable: xinference-local
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  ConfigDirs:
    macOS: ~/.xinference/
    Linux: ~/.xinference/
    Windows: '%USERPROFILE%\\.xinference\\'
  Packages:
    pip:
    - xinference
Commands:
- Command: xinference-local --host 127.0.0.1 --port 9997
  Description: Start local Xinference supervisor on localhost
  Category: Local
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: xinference launch --model-engine transformers -n qwen2.5-instruct -s 0_5
    -f pytorch
  Description: Launch model on running Xinference endpoint
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: xinference-local --host 0.0.0.0 --port 9997
  Description: XInference local model server public bind
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
