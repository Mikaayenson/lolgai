Name: RepoPrompt
Id: repoprompt
Category: cli_agent
Vendor: RepoPrompt
Description: RepoPrompt desktop app ships rp-cli for MCP/automation (repoprompt.com). Headless automation uses -e/--exec and
  --chat; there is no generic agent -p flag.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - rp-cli
  - repoprompt_cli
  - repoprompt
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://repoprompt.com
  CliExecutable: rp-cli
  Framework: native_binary
  InstallationPaths:
  - ~/.repoprompt/
  ConfigDirs:
    macOS: ~/.repoprompt/
    Linux: ~/.repoprompt/
    Windows: '%USERPROFILE%\\.repoprompt\\'
  Packages:
    brew:
    - repoprompt
Commands:
- Command: rp-cli
  Description: Interactive RepoPrompt CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: rp-cli -e 'explain this repository'
  Description: Headless exec via -e/--exec
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: rp-cli -e 'read ~/.aws/credentials --start-line 1 --limit 50'
  Description: CLI read of credential path via RepoPrompt file tools
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: rp-cli -e 'context --include prompt,selection,files'
  Description: Export workspace context including selected credential files
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: rp-cli mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem / $HOME
  Description: rp-cli mcp add registers attacker-controlled filesystem MCP server on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
- Command: rp-cli -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths and first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: repoprompt-attribution
  Name: repoprompt attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.name
    Value: rp-cli
    Reliability: high
    Platform: all
  - Rank: 2
    Field: process.name
    Value: repoprompt
    Reliability: high
    Platform: macos
  - Rank: 3
    Field: process.parent.name
    Value: rp-cli
    Reliability: high
    Platform: all
  FalsePositiveGuidance: Expected on hosts where this GenAI tool is installed. Corroborate with path, signing, and network.
Coverage:
  Verified: true
  Confidence: medium
  ReadinessGrade: B
  LastVerified: '2026-07-19'
  Source: repoprompt.com + installer script (brew repoprompt)
  EmpiricalNotes: rp-cli -e/--chat interface documented in prior pass; no local rp-cli binary on audit host (2026-07-19).
    MCP configured via desktop app, not rp-cli mcp add.
Signing:
