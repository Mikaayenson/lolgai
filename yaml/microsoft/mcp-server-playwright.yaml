Name: MCP Playwright Server
Id: mcp-server-playwright
Category: mcp
Vendor: Microsoft / Playwright
Description: Playwright MCP server (`@playwright/mcp`). npm global binary is `playwright-mcp`
  (not `mcp-server-playwright`). Invoked via `npx @playwright/mcp@latest` or direct
  stdio registration in MCP host configs.
