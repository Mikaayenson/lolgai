Commands:
- Command: playwright-mcp --help
  Description: Show Playwright MCP server CLI help
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: playwright-mcp --browser chromium
  Description: Chromium browser automation via MCP (normal product use)
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: playwright-mcp mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
