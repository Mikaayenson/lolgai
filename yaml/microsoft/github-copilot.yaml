Name: GitHub Copilot
Id: github-copilot
Category: ide_agent
Vendor: Microsoft / GitHub
Description: AI pair-programmer from GitHub — VS Code/JetBrains extension, standalone
  Copilot CLI, and GitHub.com cloud coding agent for inline suggestions and chat-assisted
  coding.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Surfaces:
- Id: ide_extension
  Label: IDE extension
  Description: Runs inside VS Code Code Helper (Plugin) alongside other extensions;
    agent mode uses the integrated terminal.
  Framework: electron
  Binaries:
  - github.copilot
  - github.copilot-chat
  - Code Helper (Plugin)
  - Code Helper (GPU)
  - Code Helper (Renderer)
  HelperProcesses:
  - Code Helper (Plugin)
  - Code Helper (GPU)
  - Code Helper (Renderer)
  SpawnsShells: true
  Agentic: true
  ConfigDirs:
    macOS: ~/.config/github-copilot/
    Linux: ~/.config/github-copilot/
    Windows: '%LOCALAPPDATA%\GitHub Copilot\'
  Signing:
    macOS:
      Depth: shared_host
      SigningId: com.microsoft.VSCode
      TeamId: UBF8T346G9
      BundleId: com.microsoft.VSCode
      SharedHostProduct: Visual Studio Code
      UsableForAttribution: false
    Windows:
      Depth: shared_host
      Publisher: GitHub Inc.
      Subject: GitHub, Inc.
      Thumbprint: A00AF3B7D5A559D608FB5BF8B7DC17EAFC7CA6AA
      SigningId: com.microsoft.VSCode
      TeamId: UBF8T346G9
      BundleId: com.microsoft.VSCode
      SharedHostProduct: Visual Studio Code
      UsableForAttribution: false
    Linux:
      Depth: shared_host
      SigningId: com.microsoft.VSCode
      TeamId: UBF8T346G9
      BundleId: com.microsoft.VSCode
      SharedHostProduct: Visual Studio Code
      UsableForAttribution: false
  Integrations:
    MCP:
      Supported: true
      Role: host
      Transports:
      - stdio
      - http-sse
      ConfigPaths:
      - .vscode/mcp.json
      - .mcp.json
      - .github/mcp.json
      - .devcontainer/devcontainer.json
      - VS Code settings.json
    Skills:
      Supported: true
      WorkspaceDirs:
      - .github/skills/
      - .claude/skills/
      - .agents/skills/
      GlobalDirs:
      - ~/.copilot/skills/
      - ~/.claude/skills/
      - ~/.agents/skills/
      SkillFile: SKILL.md
    Hooks:
      Supported: true
      Events:
      - sessionStart
      - sessionEnd
      - userPromptSubmitted
      - preToolUse
      - postToolUse
      - agentStop
      - subagentStop
      - errorOccurred
      - notification
      ConfigPaths:
        User: ~/.copilot/hooks.json
        Project: .copilot/hooks.json
      Notes: preToolUse permissionDecision 'allow' suppresses tool approval prompt
        (v1.0.18). Notification event fires asynchronously on shell completion, permission
        prompts, elicitation, and agent completion.
- Id: copilot_cli
  Label: Copilot CLI
  Description: Standalone `copilot` CLI agent; separate config home (~/.copilot/,
    COPILOT_HOME).
  Framework: node_cli
  Binaries:
  - copilot
  - copilot.exe
  - Copilot
  CliExecutable: copilot
  SpawnsShells: true
  Agentic: true
  ConfigDirs:
    macOS: ~/.copilot/ (override via COPILOT_HOME)
    Linux: ~/.copilot/ (override via COPILOT_HOME)
    Windows: '%USERPROFILE%\.copilot\ (override via COPILOT_HOME)'
  Integrations:
    MCP:
      Supported: true
      Role: host
      Transports:
      - stdio
      - http-sse
      ConfigPaths:
      - ~/.copilot/mcp-config.json
      - .vscode/mcp.json
      - .mcp.json
      - .github/mcp.json
      - .devcontainer/devcontainer.json
    Skills:
      Supported: true
      WorkspaceDirs:
      - .github/skills/
      - .claude/skills/
      - .agents/skills/
      GlobalDirs:
      - ~/.copilot/skills/
      - ~/.claude/skills/
      - ~/.agents/skills/
      SkillFile: SKILL.md
    Hooks:
      Supported: true
      Events:
      - sessionStart
      - sessionEnd
      - userPromptSubmitted
      - preToolUse
      - postToolUse
      - agentStop
      - subagentStop
      - errorOccurred
      - notification
      ConfigPaths:
        User: ~/.copilot/hooks.json
        Project: .copilot/hooks.json
      Notes: preToolUse permissionDecision 'allow' suppresses tool approval prompt
        (v1.0.18). Notification event fires asynchronously on shell completion, permission
        prompts, elicitation, and agent completion.
- Id: coding_agent
  Label: Cloud coding agent
  Framework: cloud_only
  Description: GitHub.com-hosted agent (PR-driven); no local Copilot-specific process.
  Binaries: []
  SpawnsShells: false
  Agentic: true
  Integrations:
    MCP:
      Supported: true
      Role: host
    Hooks:
      Supported: true
      Events:
      - sessionStart
      - sessionEnd
      - userPromptSubmitted
      - preToolUse
      - postToolUse
      - agentStop
      - subagentStop
      - errorOccurred
      - notification
      ConfigPaths:
        User: ~/.copilot/hooks.json
        Project: .copilot/hooks.json
      Notes: preToolUse permissionDecision 'allow' suppresses tool approval prompt
        (v1.0.18). Notification event fires asynchronously on shell completion, permission
        prompts, elicitation, and agent completion.
