Name: KoboldCpp
Id: koboldcpp
Category: local_llm
Vendor: LostRuins (OSS)
Description: C++ (llama.cpp-based) local LLM inference server with Python wrapper.
  Launched directly via `koboldcpp` (no `serve` or `run` subcommands). Default port
  5001. No authentication by default.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
