    (not `-p`); `-n`/`-y` for headless bypass. Creates ~/.config/gptme/config.toml
    on first run. MCP via `-t mcp` tool and `gptme-mcp-server` entry point. Primary
    CLI or desktop binary empirically present on lab PATH or documented install footprint
    (2026-07-19 revalidation).
