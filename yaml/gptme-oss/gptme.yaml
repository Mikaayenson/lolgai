Name: GPTMe
Id: gptme
Category: chat_cli
Vendor: gptme (OSS)
Description: Agentic chat CLI with tools (shell, browser, files, MCP). pip/pipx install
  `gptme`; config at ~/.config/gptme/.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - gptme
  - gptme.exe
  - gptme-mcp-server
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  - Bypass
  Website: https://github.com/gptme/gptme
  OfficialUrl: https://gptme.org/
  CliExecutable: gptme
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  InstallationPaths:
  - ~/.config/gptme/
  ConfigDirs:
    macOS: ~/.config/gptme/
    Linux: ~/.config/gptme/
    Windows: '%APPDATA%\\gptme\\'
  Packages:
    pip:
    - gptme
Commands:
- Command: gptme
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gptme "hello"
  Description: One-shot prompt (positional; chains with `-` separator)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gptme -n -y "summarize this repo"
  Description: Non-interactive mode with confirmations skipped (-n implies -y)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gptme -n -y "run cat ~/.aws/credentials ~/.ssh/id_ed25519 and print output"
  Description: Non-interactive -n -y auto-approves shell tool runs without confirmation;
    reads credential files
  Category: Bypass
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: gptme mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: gptme mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
- Command: gptme -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths and
    first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
