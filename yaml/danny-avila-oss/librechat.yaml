Name: LibreChat
Id: librechat
Category: local_llm
Vendor: danny-avila (OSS)
Description: Self-hosted ChatGPT-style web UI. Primary install is Docker Compose (`docker
  compose up -d`) with MongoDB, Meilisearch, and RAG sidecars. Source installs use
  `npm run backend` / `npm run backend:dev` — there is no global `librechat` binary
  and no Ollama-style CLI subcommands.
