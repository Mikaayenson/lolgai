  - Path: .roomodes
    Notes: Context/instructions file
  - Path: .clinerules
    Notes: Context/instructions file
  - Path: ~/.roo/
    Notes: Context/instructions file
  - Path: VS Code settings.json (under roo-cline.mcpServers)
    Notes: MCP server configuration
  - Path: .roo/mcp.json
    Notes: MCP server configuration
  MCP:
