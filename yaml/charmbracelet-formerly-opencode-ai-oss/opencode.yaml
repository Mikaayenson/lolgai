Name: OpenCode
Id: opencode
Category: cli_agent
Vendor: Anomaly Innovations (opencode.ai)
Description: Open-source AI coding agent TUI from anomalyco/opencode (active; distinct
  from Charm Crush). Distributed via npm (opencode-ai), Homebrew (anomalyco/tap/opencode),
  and curl installer. Supports MCP host, headless `opencode run`, and experimental
  server mode. Legacy opencode-ai/opencode repo is archived.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - opencode
  - opencode.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://opencode.ai/docs/
  OfficialUrl: https://opencode.ai/
  CliExecutable: opencode
  Framework: native_binary
  InstallationPaths:
  - ~/.local/share/opencode/
  - ~/.config/opencode/
  - $HOME/.opencode.json
  - '%USERPROFILE%\.opencode.json'
  ContextFiles:
  - AGENTS.md
  - CLAUDE.md
  - .opencode.json
  - ~/.config/opencode/AGENTS.md
  - ~/.claude/CLAUDE.md
  ConfigDirs:
    macOS: ~/.config/opencode/
    Linux: ~/.config/opencode/
    Windows: '%APPDATA%\\opencode\\'
  Packages:
    npm:
    - opencode-ai
    brew:
    - anomalyco/tap/opencode
    curl:
    - https://opencode.ai/install
Commands:
- Command: opencode
  Description: Interactive agent TUI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: opencode run "explain this repository"
  Description: Headless one-shot agent run via run subcommand
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: opencode --prompt "refactor auth module"
  Description: Non-interactive prompt on root command (alternative to opencode run)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: opencode run "read ~/.aws/credentials and summarize keys"
  Description: Headless opencode run can ingest credential paths when permissions
    allow
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: opencode mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: opencode mcp add registers attacker-controlled filesystem MCP server
    on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
