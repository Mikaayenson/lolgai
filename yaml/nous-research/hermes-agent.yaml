    Notes: MCP server configuration
Signing:
  macOS:
    Depth: none
    UsableForAttribution: false
    Notes: Python/uv-installed CLI shim — attribute via process.name hermes + ~/.hermes
      paths.
  Linux:
    Depth: none
    UsableForAttribution: false
    Notes: Observed at ~/.local/bin/hermes on some hosts; no stable publisher signature.
  Windows:
    Depth: none
    UsableForAttribution: false
    Notes: Managed install under %LOCALAPPDATA%\hermes; corroborate with path and
      parent.
