Name: Kiro (AWS)
Id: kiro
Category: ide_agent
Vendor: Amazon Web Services
Description: AWS Kiro product family — spec-driven agent IDE (VS Code fork) and Kiro
  CLI (rebranded from Amazon Q Developer CLI, November 2025). CLI supports agent mode,
  MCP, hooks, and custom agents; backwards compatible with legacy `q` / `q chat` entrypoints.
  IDE uses AWS Builder ID auth and.kiro/ steering files for spec-driven development.
SearchAliases:
- amazon-q-developer-cli
- amazon q developer cli
- q chat
- codewhisperer cli
