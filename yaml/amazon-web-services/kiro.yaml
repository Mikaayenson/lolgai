Commands:
- Command: kiro-cli chat
  Description: Interactive Kiro CLI chat
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: kiro-cli doctor
  Description: Check Kiro CLI auth and configuration
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: kiro-cli mcp list
  Description: List configured MCP servers
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: kiro-cli chat "enumerate IAM roles in this account" --trust-all-tools
  Description: kiro-cli --trust-all-tools auto-trusts all agent tools for one-shot
    prompt
  Category: Bypass
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: kiro-cli --agent security-reviewer chat "review terraform for secrets"
    --trust-all-tools
  Description: kiro-cli --agent profile with --trust-all-tools for named agent abuse
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: q chat "print contents of ~/.aws/credentials" --trust-all-tools
  Description: Legacy q chat alias with --trust-all-tools reads credential files
  Category: Bypass
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: kiro-cli chat --resume
  Description: kiro-cli --resume resumes prior agent session (may inherit prior tool
    grants)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: kiro-cli mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: kiro-cli mcp add registers attacker-controlled filesystem MCP server
    on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
- Command: kiro-cli -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths
    and first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
