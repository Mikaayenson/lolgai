    Linux/mac ~/.local/bin/kiro-cli via curl cli.kiro.dev/install. Lab 2026-07-19:
    kiro-cli v2.2.2 at ~/.local/bin (macOS); codesign Identifier=kiro-cli TeamId=94KV3E626L.
    chat uses positional INPUT and -a/--trust-all-tools (no -p flag). Legacy q/qchat
    not on lab PATH. IDE not lab-installed. Primary CLI or desktop binary empirically
    present on lab PATH or documented install footprint (2026-07-19 revalidation).'
