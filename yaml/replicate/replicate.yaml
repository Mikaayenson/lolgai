Name: Replicate Python SDK
Id: replicate
Category: cloud_mlops
Vendor: Replicate
OfficialUrl: https://replicate.com/docs
Description: Official Replicate Python client library (`pip install replicate`). No
  `replicate` console script is shipped — use `import replicate` / `replicate.run()`
  from Python. For container CLI see separate cog entry.
