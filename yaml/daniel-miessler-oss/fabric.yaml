Name: Fabric
Id: fabric
Category: chat_cli
Vendor: Daniel Miessler (OSS)
Description: Go-based AI prompt-pattern CLI (fabric-ai on Homebrew). Patterns for
  summarization, extraction, and analysis.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - fabric
  - fabric.exe
  - fabric-ai
  - fabric-ai.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities: []
  Website: https://github.com/danielmiessler/fabric
  OfficialUrl: https://github.com/danielmiessler/fabric
  CliExecutable: fabric-ai
  Framework: go_cli
  InstallationPaths:
  - ~/.config/fabric/
  - ~/.local/bin/fabric
  - '%USERPROFILE%\\.config\\fabric\\'
  ConfigDirs:
    macOS: ~/.config/fabric/
    Linux: ~/.config/fabric/
    Windows: '%USERPROFILE%\\.config\\fabric\\'
  Packages:
    brew:
    - fabric-ai
Commands:
- Command: fabric-ai -S setup
  Description: Configure Fabric vendors, models, and patterns
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: fabric-ai -l
  Description: List available Fabric patterns
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: echo "hello" | fabric-ai -p summarize
  Description: Run a Fabric pattern on stdin (-p is pattern name, not inline prompt)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: cat ~/.aws/credentials | fabric-ai -p extract_wisdom
  Description: Pipe credential file into Fabric pattern (-p is pattern name; stdin
    carries secret material)
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
