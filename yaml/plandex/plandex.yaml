Artifacts:
  ConfigFiles:
  - Path: ~/.plandex/
    Notes: Local config and plan state
  - Path: env OPENROUTER_API_KEY
    Notes: Default provider key for self-hosted/local mode
  Network:
  - Domains:
    - openrouter.ai
    Description: Default model provider when using OpenRouter key
