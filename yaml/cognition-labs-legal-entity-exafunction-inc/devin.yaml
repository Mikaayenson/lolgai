Name: Devin
Id: devin
Category: cli_agent
Vendor: 'Cognition Labs (legal entity: Exafunction, Inc.)'
Description: Autonomous AI software engineer. Originally cloud-only; now also ships a local CLI ('Devin for Terminal') and
  an ACP server. Local CLI is a single statically-linked Rust binary (~110 MB) signed by Exafunction, Inc. (Team ID 83Z2LHX6XW).
  Cognition acquired Windsurf in July 2025; Devin CLI subprocesses still spawn the Windsurf shell wrapper.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - devin
  - devin.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://docs.devin.ai/get-started/devin-intro
  CliExecutable: devin
  Framework: rust_cli
  InstallationPaths:
  - ~/.config/devin/
  - '%APPDATA%\devin\'
  ContextFiles:
  - .devin/skills/
  - .agents/skills/
  - ~/.config/devin/skills/
  - ~/.agents/skills/
  - .cursorrules
  - .cursor/rules/*.md
  - .windsurf/rules/*.md
  ConfigDirs:
    macOS: ~/.config/devin/
    Linux: ~/.config/devin/
    Windows: '%APPDATA%\devin\'
Commands:
- Command: devin
  Description: Interactive agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: devin -p "explain this repository"
  Description: One-shot print-mode prompt (-p/--print for non-interactive)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: devin mcp list
  Description: List configured MCP servers
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: devin -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; output full contents to stdout"
  Description: Headless print-mode agent task explicitly targeting credential paths
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: devin -p "find world-readable *.pem *.key *.env under $HOME; print paths and head -5 each"
  Description: Automated secret discovery via headless print-mode agent tools
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: devin mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem / $HOME
  Description: devin mcp add registers attacker filesystem MCP server
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
