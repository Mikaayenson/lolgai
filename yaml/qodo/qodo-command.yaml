Name: Qodo Command
Id: qodo-command
Category: cli_agent
Vendor: Qodo
Description: CLI for building, managing, and running AI agents. Interactive chat,
  custom agent configuration, web UI mode, and webhook (HTTP API) mode. Successor
  to deprecated @qodo/gen package. Headless prompts use positional `qodo <prompt>`
  or `qodo run <command>` — `-p` is `--port`, not prompt.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - qodo
  - qodo.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://docs.qodo.ai/qodo-command
  OfficialUrl: https://docs.qodo.ai/qodo-command
  CliExecutable: qodo
  Framework: node_cli
  HelperProcesses:
  - node
  InstallationPaths:
  - ~/.qodo/
  - '%USERPROFILE%\.qodo\'
  ContextFiles:
  - .qodo/
  - ~/.qodo/
  ConfigDirs:
    macOS: ~/.qodo/
    Linux: ~/.qodo/
    Windows: '%USERPROFILE%\.qodo\'
  Packages:
    npm:
    - '@qodo/command'
Commands:
- Command: qodo
  Description: Interactive Qodo agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: qodo "explain this repository"
  Description: One-shot agent prompt (default approvals)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: qodo run "read ~/.aws/credentials and ~/.ssh/id_ed25519; output full contents
    to stdout"
  Description: Headless agent task explicitly targeting credential paths
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: qodo run "find world-readable *.pem *.key *.env under $HOME; print paths
    and head -5 each"
  Description: Automated secret discovery via agent file/shell tools
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: qodo mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: qodo mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
