Name: Grok
Id: grok
Category: api_only
Vendor: xAI
Description: 'xAI''s LLM. Includes Grok Build (cloud-based agentic coding). No official
  CLI or desktop app from xAI itself — API-only at api.x.ai. Community wrappers exist
  and ARE detectable on the endpoint: grok-agent (npm), Grok-Electron-Client, GrokChat
  (SwiftUI). Confirmed no /Applications/Grok.app from xAI.'
