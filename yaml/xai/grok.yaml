DetectionOpportunities:
- Id: grok-process
  Name: grok process
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.name
    Value: grok-agent
    Reliability: high
    FalsePositiveGuidance: Community npm CLI shim; on some hosts the observable process.name
      is node with grok-agent in command_line — corroborate with path and parent.
  - Rank: 2
    Field: process.executable
    Value: /opt/homebrew/bin/grok-agent
    Reliability: medium
    FalsePositiveGuidance: Install path varies by package manager and OS; treat as
      a strong hint, not a sole match.
  FalsePositiveGuidance: Enrich with ranked attribution signals via PR.
Coverage:
  Verified: true
  Confidence: high
  ReadinessGrade: C
  LastVerified: '2026-07-18'
  Source: catalog maintainer
  EmpiricalNotes: 'Empirically verified on macOS + Windows 11 ARM64 (2026-04-26).
    Confirmed no official xAI desktop/CLI; community grok-agent@0.8.1 installed and
    inspected. sh v1.8.3. detection signal corrected to process.name grok-agent (not
    grok). No official xAI CLI. Primary CLI or desktop binary empirically present
    on lab PATH or documented install footprint (2026-07-19 revalidation). VerificationLevel
    demoted to documented (2026-07-18 audit: thin empirical evidence).'
