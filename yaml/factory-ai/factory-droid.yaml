  EmpiricalNotes: macOS lab droid v0.109.1 via npm global `droid` (2026-07-19). Headless
    subcommand is `droid exec` (not `droid run` or `-p`). Windows ARM64 empirically
    verified 2026-04-25; native Bun binary NotSigned. Config tree ~/.factory/ (cache/,
    certs/, droids/, logs/, sessions/, telemetry/). Primary CLI or desktop binary
    empirically present on lab PATH or documented install footprint (2026-07-19 revalidation).
