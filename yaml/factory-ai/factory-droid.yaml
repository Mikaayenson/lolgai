Name: Factory Droid CLI
Id: factory-droid
Category: cli_agent
Vendor: Factory AI
Description: Factory AI's terminal development agent. End-to-end feature development
  with deep codebase understanding. Integrates with Jira, Notion, Slack. Interactive
  REPL and non-interactive 'droid exec' modes.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - droid
  - droid.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  - Bypass
  Website: https://docs.factory.ai/cli/getting-started/overview
  CliExecutable: droid
  Framework: node_cli
  HelperProcesses:
  - node
  InstallationPaths:
  - ~/.factory/
  - '%USERPROFILE%\.factory\'
  ContextFiles:
  - .factory/
  - ~/.factory/
  ConfigDirs:
    macOS: ~/.factory/
    Linux: ~/.factory/
    Windows: '%USERPROFILE%\.factory\'
  Packages:
    npm:
    - droid
    winget:
    - FactoryAI.Factory
    brew:
    - factory
Commands:
- Command: droid
  Description: Interactive Droid agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: droid exec "explain this repository"
  Description: Non-interactive droid exec one-shot task
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: droid mcp list
  Description: List configured MCP servers
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: droid exec "read ~/.aws/credentials and ~/.ssh/id_ed25519; output full
    contents to stdout"
  Description: Headless agent task explicitly targeting credential paths
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: droid exec --skip-permissions-unsafe "find world-readable *.pem *.key *.env
    under $HOME; print paths and head -5 each"
  Description: droid exec --skip-permissions-unsafe skips all permission checks (unsafe)
  Category: Bypass
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: droid mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: droid mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
