  - Path: ~/.config/PearAI/User/settings.json
    Notes: Desktop IDE settings + MCP (Linux)
    Platform: Linux
  - Path: '%APPDATA%\PearAI\User\settings.json'
    Notes: Desktop IDE settings + MCP (Windows)
