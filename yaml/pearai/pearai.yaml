Signing:
  macOS:
    Depth: shared_host
    UsableForAttribution: false
    SigningId: com.visualstudio.code.oss
    TeamId: 86R64QP89M
    BundleId: com.visualstudio.code.oss
    Notes: Bundle ID is unchanged from upstream OSS Code — collides with other VS
      Code-family forks. Attribute by team_id (86R64QP89M, Nathan Ang) — identifier
      alone is shared_host, not product-specific.
