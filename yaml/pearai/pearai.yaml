Name: PearAI
Id: pearai
Category: ide_agent
Vendor: PearAI
Description: Open-source AI code editor forked from VS Code. Includes PearAI Router
  (auto-selects best LLM) and PearAI Agent (powered by Roo Code/Cline lineage). MIT-licensed.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - PearAI
  - pearai
  - PearAI.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  Website: https://trypear.ai/
  CliExecutable: PearAI
  Framework: electron
  HelperProcesses:
  - Electron
  - PearAI Helper
  - PearAI Helper (Plugin)
  - PearAI Helper (GPU)
  - PearAI Helper (Renderer)
  InstallationPaths:
  - ~/Library/Application Support/PearAI/
  - ~/.config/PearAI/
  - '%APPDATA%\PearAI\'
  ContextFiles:
  - .pearai/
  ConfigDirs:
    macOS: ~/Library/Application Support/PearAI/
    Linux: ~/.config/PearAI/
    Windows: '%APPDATA%\PearAI\'
  Packages:
    winget:
    - PearAI.PearAI
    cdn:
    - pearai-app.nyc3.digitaloceanspaces.com/PearAI-latest
Commands:
- Command: PearAI .
  Description: Open project in IDE
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: PearAI --help
  Description: Show IDE CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: open -a PearAI --args "$HOME/.aws/credentials"
  Description: Script-launched PearAI pointed at credential path (macOS)
  Category: Execute
  Privileges: User
  MitreID: T1204
  Usage: abuse
  Platform: macOS
- Command: '# PearAI Agent abuse via Roo/Cline lineage — tamper .pearai/ or VS Code
    MCP settings, not a standalone agent CLI'
  Description: Malicious project context or MCP config ingested by PearAI Agent extension
    host
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: pearai-attribution
  Name: PearAI attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.parent.name
    Value: PearAI Helper (Plugin)
    Reliability: medium
    Platform: macos
  FalsePositiveGuidance: Expected on hosts where this GenAI tool is installed. Corroborate
    with path, signing, and network.
Coverage:
  Verified: true
  Confidence: high
  ReadinessGrade: B
  LastVerified: '2026-07-18'
  Source: catalog maintainer
  EmpiricalNotes: 'macOS lab PearAI.app at /Applications/PearAI.app (2026-07-19):
    creates ~/Library/Application Support/PearAI/; codesign Identifier=com.visualstudio.code.oss
    Team 86R64QP89M (shared OSS bundle ID — attribute by team_id). Prior Intel lab
    1.96.4 (2026-04-25). Homebrew cask `pearai` unavailable — install via CDN tarball
    or GitHub releases. Windows installer needs interactive UAC. PearAI.app present
    on macOS lab VM (2026-07-19 full install pass).'
Artifacts:
  Network:
