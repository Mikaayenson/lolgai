Coverage:
  Verified: true
  Confidence: medium
  ReadinessGrade: B
  LastVerified: '2026-07-19'
  Source: NVIDIA/NemoClaw README + src/commands/sandbox/agent.ts
  EmpiricalNotes: Alpha preview — install script clones source to ~/.local/share/nemoclaw
    without exposing host CLI by default. No `nemoclaw run` subcommand; use `nemoclaw
    sandbox agent <name> --agent <id> -m`. OpenClaw passthrough requires --agent,
    --session-id, --session-key, or --to. Bin aliases nemohermes and nemo-deepagents
    per package.json. NVIDIA NemoClaw blueprint under ~/.local/share/nemoclaw/nemoclaw
    (2026-07-19 full install pass).
