Name: NemoClaw (NVIDIA)
Id: nemoclaw
Category: framework
Vendor: NVIDIA
Description: 'NVIDIA''s open-source (Apache 2.0) enterprise security wrapper for OpenClaw.
  Architecture: NemoClaw Plugin (TypeScript CLI) + NemoClaw Blueprint (Python orchestrator)
  + OpenShell Sandbox (K3s Kubernetes inside Docker container). Adds container-isolated
  agent execution with YAML security policies, inference routing through approved
  endpoints, and PII stripping. Announced at GTC 2026 (March 16, 2026). Early preview/alpha.'
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
