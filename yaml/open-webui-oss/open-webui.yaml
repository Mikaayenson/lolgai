Name: Open WebUI
Id: open-webui
Category: local_llm
Vendor: Open WebUI (OSS)
Description: Self-hosted AI chat/RAG web UI (successor to Ollama WebUI). Primary distribution
  is Docker (`ghcr.io/open-webui/open-webui`). Source installs run `python -m uvicorn
  open_webui.main:app`. Workspace Tools and admin Functions execute arbitrary Python
  on the server process — high blast radius per AIRQ (Exposed Giants, AIRQ 5.07).
