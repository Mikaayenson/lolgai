Name: Cursor
Id: cursor
Category: ide_agent
Vendor: Anysphere
OfficialUrl: https://cursor.com/docs
Description: Cursor IDE (Electron) plus Agent CLI (`agent`) and bundled remote tunnel helpers (`cursor-tunnel`,
  `code-tunnel`). In-IDE Agent and Tab use Cursor Helper processes and sandboxed terminal. Agent CLI installs
  via cursor.com/install and shares rules/MCP config with the IDE.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
