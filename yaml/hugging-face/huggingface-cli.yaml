Name: Hugging Face CLI
Id: huggingface-cli
Category: cloud_mlops
Vendor: Hugging Face
Description: Hugging Face Hub CLI (`hf`; legacy alias `huggingface-cli`). Standalone
  installer or `pip install huggingface_hub[cli]` for model/dataset download, upload,
  auth, and cache management.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - hf
  - hf.exe
  - huggingface-cli
  - huggingface-cli.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Headless
  Website: https://huggingface.co/docs/huggingface_hub/guides/cli
  OfficialUrl: https://huggingface.co/docs/huggingface_hub/guides/cli
  CliExecutable: hf
  CliAliases:
  - huggingface-cli
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  InstallationPaths:
  - ~/.cache/huggingface/
  - '%USERPROFILE%\\.cache\\huggingface\\'
  - ~/.local/bin/hf
  ConfigDirs:
    macOS: ~/.cache/huggingface/
    Linux: ~/.cache/huggingface/
    Windows: '%USERPROFILE%\\.cache\\huggingface\\'
  Packages:
    pip:
    - huggingface_hub[cli]
    - huggingface_hub
    curl:
    - https://hf.co/cli/install.sh
    - https://hf.co/cli/install.ps1
Commands:
- Command: hf --help
  Description: Show Hugging Face Hub CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: hf download meta-llama/Llama-3.2-3B --local-dir ./models
  Description: Download model weights to disk
  Category: Execute
  Privileges: User
  MitreID: T1105
  Usage: normal
  Platform: all
- Command: hf auth login
  Description: Authenticate to Hugging Face Hub (stores token in cache)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: hf download meta-llama/Llama-3.2-3B --local-dir ./models --token "$STOLEN"
  Description: Download gated weights using stolen HF token from env or cache
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
- Command: hf -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths and first
    lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
