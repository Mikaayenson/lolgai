Name: AUTOMATIC1111 WebUI
Id: automatic1111
Category: image_gen
Vendor: AUTOMATIC1111 (OSS)
Description: Stable Diffusion WebUI — git-cloned repo launched via `webui.sh` / `webui-user.bat`
  (not a global install). User data defaults to repo `--data-dir` (./) with config.json,
  models/, embeddings/; override via webui-user.sh `COMMANDLINE_ARGS` / `export COMMANDLINE_ARGS`.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - webui.sh
  - webui-user.bat
  - webui-user.sh
  Agentic: false
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Local
  Website: https://github.com/AUTOMATIC1111/stable-diffusion-webui
  OfficialUrl: https://github.com/AUTOMATIC1111/stable-diffusion-webui
  CliExecutable: webui.sh
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  - bash
  InstallationPaths: []
  ConfigDirs:
    macOS: <repo>/ (default --data-dir ./; set in webui-user.sh)
    Linux: <repo>/ (default --data-dir ./; set in webui-user.sh)
    Windows: <repo>\ (default --data-dir ./; set in webui-user.bat)
Commands:
- Command: ./webui.sh --help
  Description: Show WebUI launcher help (repo-local webui.sh)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: ./webui.sh --listen --api
  Description: A1111 WebUI with API exposed on LAN
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platforms:
  - Linux
  - macOS
- Command: export COMMANDLINE_ARGS="--listen --api" && ./webui.sh
  Description: A1111 WebUI with API exposed on LAN (webui-user.sh pattern)
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platforms:
