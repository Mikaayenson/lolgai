Name: Fooocus
Id: fooocus
Category: image_gen
Vendor: lllyasviel (OSS)
Description: Offline SDXL image generator with Gradio UI. Distributed as a git clone
  or Windows release archive; entry points are `entry_with_update.py` (git pull +
  launch) or `run.bat` on Windows. No PyPI package or global binary.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - entry_with_update.py
  - launch.py
  - run.bat
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Local
  Website: https://github.com/lllyasviel/Fooocus
  OfficialUrl: https://github.com/lllyasviel/Fooocus
  CliExecutable: entry_with_update.py
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  InstallationPaths:
  - ~/Fooocus/
  - '%USERPROFILE%\Fooocus\'
Commands:
- Command: python entry_with_update.py --help
  Description: Show Fooocus launcher CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: python entry_with_update.py
  Description: Launch Fooocus Gradio UI on localhost
  Category: Local
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: python entry_with_update.py --listen
  Description: Fooocus Gradio listen mode exposes workflow API on LAN
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: fooocus-attribution
  Name: Fooocus python launcher
