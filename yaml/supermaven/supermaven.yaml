Name: Supermaven
Id: supermaven
Category: ide_extension
Vendor: Supermaven
Description: Fast code completion VS Code extension with 1M-token Pro context window. Lightweight inline suggestions and chat
  (OpenAI/Anthropic). Primarily completion-focused; agentic shell-spawning behavior is limited compared to full coding agents.
  No standalone CLI — marketplace ID supermaven.supermaven is not a shell executable.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - Code Helper (Plugin)
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities: []
  Website: https://supermaven.com/
  Framework: vscode_extension
  HelperProcesses:
  - Code Helper (Plugin)
  - Code Helper (Renderer)
  InstallationPaths:
  - ~/.vscode/extensions/supermaven.supermaven-*/
  - '%USERPROFILE%\.vscode\extensions\supermaven.supermaven-*\'
  ConfigDirs:
    macOS: ~/.vscode/extensions/supermaven.supermaven-*/
    Linux: ~/.vscode/extensions/supermaven.supermaven-*/
    Windows: '%USERPROFILE%\.vscode\extensions\supermaven.supermaven-*\'
Commands:
- Command: Code Helper (Plugin) --help
  Description: Show extension CLI help when a binary ships
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: '# completion extension — no standalone CLI; abuse is prompt/context injection in editor'
  Description: Malicious repo context or pasted secrets sent to Supermaven backend via inline completion/chat
  Category: Headless
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
