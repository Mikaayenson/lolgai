Name: ShellGPT
Id: shellgpt
Category: chat_cli
Vendor: TheR1D (OSS)
Description: Shell assistant CLI (`sgpt`). Natural-language shell commands, code,
  and Q&A via LLM APIs. Prompt via positional argument or stdin pipe; no `-p` one-shot
  flag.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
