  - sgpt
  - sgpt.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities: []
  Website: https://github.com/TheR1D/shell_gpt
  CliExecutable: sgpt
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  InstallationPaths:
  - ~/.config/shell_gpt/
  - '%APPDATA%\\shell_gpt\\'
  ConfigDirs:
    macOS: ~/.config/shell_gpt/
    Linux: ~/.config/shell_gpt/
    Windows: '%APPDATA%\\shell_gpt\\'
  Packages:
    pip:
    - shell-gpt
Commands:
- Command: sgpt
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: sgpt -p "hello"
