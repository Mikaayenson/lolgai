  EmpiricalNotes: Lab macOS duo v8.89.0 via npm @gitlab/duo-cli (NOT @gitlab-org/duo-cli).
    Subcommands version, run, config, log — no `duo ask`. Node-shim wrapper (NotSigned).
    Storage at ~/.gitlab/storage.json. Primary CLI or desktop binary empirically present
    on lab PATH or documented install footprint (2026-07-19 revalidation).
Artifacts:
