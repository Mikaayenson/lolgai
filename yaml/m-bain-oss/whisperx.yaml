Name: WhisperX
Id: whisperx
Category: speech
Vendor: m-bain (OSS)
Description: Forced-alignment ASR pipeline with word-level timestamps and optional
  speaker diarization. PyPI `whisperx` ships a `whisperx` CLI (positional audio path;
  `--model`, `--output_dir`, `--diarize`, etc.).
