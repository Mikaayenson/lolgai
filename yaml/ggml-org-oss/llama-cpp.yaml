Name: llama.cpp (llama-server / llama-cli)
Id: llama-cpp
Category: local_llm
Vendor: ggml-org (OSS)
Description: C/C++ local LLM inference tools. llama-server runs an OpenAI-compatible
  HTTP API (default port 8080). llama-cli is the interactive CLI. Repo at ggml-org/llama.cpp
  (formerly ggerganov/llama.cpp).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - llama-server
  - llama-cli
  - llama-quantize
  - llama-bench
  - llama-tts
  - llama-tokenize
  - llama-perplexity
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Local
  Website: https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md
  OfficialUrl: https://github.com/ggml-org/llama.cpp
  CliExecutable: llama-server
  Framework: cpp_native
  Packages:
    brew:
    - llama.cpp
Commands:
- Command: llama-server -m model.gguf
  Description: Start local inference HTTP server (default 127.0.0.1:8080)
  Category: Local
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: llama-cli -m model.gguf -p "hello"
  Description: Local one-shot inference from shell
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: llama-server -m model.gguf --host 0.0.0.0 --port 8080
  Description: Expose local GGUF model HTTP API on all interfaces
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: llama-cli -m model.gguf -p "summarize sensitive file contents"
  Description: Interactive/local inference from shell
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
