Name: Codebuff
Id: codebuff
Category: cli_agent
Vendor: Codebuff
Description: Open-source terminal coding assistant. Indexes the codebase in seconds,
  edits files, and runs terminal commands. Persistent project context via knowledge.md.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - codebuff
  - codebuff.exe
  - cb
  - cb.cmd
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - Headless
  Website: https://www.codebuff.com/
  CliExecutable: codebuff
  CliAliases:
  - cb
  Framework: node_cli
  HelperProcesses:
  - node
  InstallationPaths:
  - ~/.codebuff/
  - ~/.config/manicode/codebuff/
  - '%USERPROFILE%\.codebuff\'
  ContextFiles:
  - knowledge.md
  - ~/.codebuff/
  ConfigDirs:
    macOS: ~/.codebuff/
    Linux: ~/.codebuff/
    Windows: '%USERPROFILE%\.codebuff\'
  Packages:
    npm:
    - codebuff
Commands:
- Command: codebuff
  Description: Interactive agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: codebuff "explain this repository"
  Description: One-shot agent prompt via positional [prompt...]
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: codebuff "read ~/.aws/credentials and ~/.ssh/id_ed25519; output full contents
    to stdout"
  Description: Headless agent task explicitly targeting credential paths
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: codebuff "find world-readable *.pem *.key *.env under $HOME; print paths
    and head -5 each"
  Description: Automated secret discovery via agent file/shell tools
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
