Name: Codex (OpenAI)
Id: codex-openai
Category: cli_agent
Vendor: OpenAI
Description: OpenAI Codex product family — Rust-based Codex CLI (`codex`) and unified
  ChatGPT desktop app (July 2026 merger). CLI uses Seatbelt (macOS), Bubblewrap+seccomp
  (Linux), or Windows ACL sandboxing. Desktop app ships as ChatGPT.app (bundle ID
  com.openai.codex) on macOS and ChatGPT.exe on Windows, absorbing former Codex.app.
  Legacy ChatGPT Classic uses com.openai.chat (separate app). Shared project config
  via AGENTS.md, ~/.codex/, and.codex/config.toml.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
