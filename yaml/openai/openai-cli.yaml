Name: OpenAI CLI
Id: openai-cli
Category: api_only
Vendor: OpenAI
Description: Console script shipped with the official OpenAI Python SDK (`pip install
  openai`). Subcommands include `openai api` for direct REST calls — not the OpenAI
  Codex agent CLI (see codex-openai).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
