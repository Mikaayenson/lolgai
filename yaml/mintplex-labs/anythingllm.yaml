Commands:
- Command: open -a AnythingLLM
  Description: Launch desktop app (macOS)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: macOS
- Command: Start-Process "AnythingLLMDesktop"
  Description: Launch desktop app (Windows)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: Windows
- Command: Start-Process "$env:LOCALAPPDATA\Programs\anythingllm-desktop\AnythingLLMDesktop.exe"
    -ArgumentList "$env:USERPROFILE\.aws\credentials"
  Description: Launch AnythingLLM onto credential path (Windows)
  Category: Execute
  Privileges: User
  MitreID: T1204
  Usage: abuse
  Platform: Windows
