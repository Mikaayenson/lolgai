  - AnythingLLMDesktop
  - AnythingLLMDesktop.exe
  - ollama
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - Local
  Website: https://anythingllm.com/
  OfficialUrl: https://anythingllm.com/
