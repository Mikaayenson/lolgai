Name: AnythingLLM
Id: anythingllm
Category: desktop
Vendor: Mintplex Labs
Description: All-in-one local RAG/chat desktop app with optional Docker server deployment.
  Desktop process AnythingLLMDesktop bundles Node server, document collector, and
  embedded Ollama (binds :11434). Agent skills in storage/plugins/; beta computer-use
  automation agent. High-risk per AIRQ (Exposed Giants, AIRQ 3.08).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
