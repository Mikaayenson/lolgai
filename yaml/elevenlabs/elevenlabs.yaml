Name: ElevenLabs Agents CLI
Id: elevenlabs
Category: cli_agent
Vendor: ElevenLabs
Description: ElevenLabs `@elevenlabs/cli` npm package — agents-as-code CLI for init/push/manage
  of ElevenLabs conversational agents. Separate from the Python `elevenlabs` SDK (library-only;
  no console script on PyPI).
