Commands:
- Command: elevenlabs
  Description: Interactive agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: elevenlabs -p "explain this repository"
  Description: One-shot agent prompt (default approvals)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: ELEVENLABS_API_KEY="$STOLEN" elevenlabs agents push
  Description: Stolen ElevenLabs key pushes attacker-controlled agent config to cloud
    workspace
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
- Command: elevenlabs -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; print paths
    and first lines"
  Description: Headless prompt mode used to ingest credential file contents via agent
    context
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
