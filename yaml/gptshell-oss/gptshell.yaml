Commands:
- Command: gsh --help
  Description: Show GPTShell CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gsh -ttc list files in current directory
  Description: Translate plain English to a shell command (interactive confirm before
    run)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gsh -ttc read ~/.aws/credentials and ~/.ssh/id_ed25519 and print first
    lines
  Description: Natural-language prompt steers LLM toward credential paths; user may
    approve execution
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: gsh -ttc find world-readable *.pem *.key *.env under $HOME and print paths
  Description: Automated secret-discovery phrasing via text-to-command translation
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
