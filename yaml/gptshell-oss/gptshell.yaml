Name: GPTShell
Id: gptshell
Category: chat_cli
Vendor: GPTShell (OSS)
Description: Legacy PyPI CLI (`gsh` binary) that uses LangChain OpenAI to translate
  natural-language descriptions into shell commands (`-ttc`) or describe commands
  in English (`-ctt`). Package last updated 2023; breaks on modern langchain imports.
  Not related to any IDE product named GPTShell.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
