Name: Charmbracelet Crush
Id: crush
Category: cli_agent
Vendor: Charmbracelet
Description: Glamorous terminal AI coding agent. Multi-model LLM switching, session-based
  context, LSP integration. Distributed cross-platform (macOS, Linux, Windows, BSDs,
  Android) via Homebrew tap, npm (@charmland/crush), Go install, scoop, winget, and
  Arch AUR.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - crush
  - crush.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://github.com/charmbracelet/crush
  OfficialUrl: https://charmbracelet-crush.mintlify.app/
  CliExecutable: crush
  Framework: go_cli
  InstallationPaths: []
  ContextFiles:
  - .crush/
  - ~/.config/crush/
  ConfigDirs:
    macOS: ~/.config/crush/
    Linux: ~/.config/crush/
    Windows: '%APPDATA%\crush\'
  Packages:
    npm:
    - '@charmland/crush'
    winget:
    - Charmbracelet.Crush
    brew:
    - charm/charm/crush
Commands:
- Command: crush
  Description: Interactive Crush agent session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: crush run "explain this repository"
  Description: One-shot Crush prompt via run subcommand
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: crush --yolo
  Description: Charm Crush interactive session with YOLO auto-approve (global flag)
  Category: Bypass
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: crush run "apply dependency upgrades without approval prompts"
  Description: Headless crush run (provider-dependent tool approvals)
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: crush mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: crush mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
