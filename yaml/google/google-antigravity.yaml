  Description: antigravity-cli alias with --dangerously-skip-permissions for outbound
    transfer
  Category: Bypass
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: agy -p "headless task that reads ~/.aws/credentials"
  Description: agy -p/--print one-shot headless task for scripted credential access
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: abuse
  Platform: all
- Command: '# Antigravity MCP abuse — tamper ~/.gemini/antigravity-cli/mcp_config.json
