Name: Antigravity (Google — CLI + IDE)
Id: google-antigravity
Category: cli_agent
Vendor: Google
Description: 'Google Antigravity product family: standalone Antigravity CLI (`agy`,
  antigravity-cli) and Antigravity 2.0 desktop IDE. CLI is a Go-based TUI installed
  via antigravity.google/cli (curl/irm) to ~/.local/bin/agy — distinct from the Homebrew
  cask `agy` shim that execs the IDE''s bundled antigravity binary. Desktop is VS
  Code-derived with async multi-agent Manager surface. Both share the agent harness;
  Gemini CLI consumer access sunsets June 2026 in favor of Antigravity CLI.'
