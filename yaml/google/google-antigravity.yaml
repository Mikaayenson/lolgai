  MitreID: T1204
  Usage: abuse
  Platform: macOS
DetectionOpportunities:
- Id: google-antigravity-cli-attribution
  Name: Standalone Antigravity CLI (agy) attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.code_signature.signing_id
    Value: cli
    Reliability: high
    Platform: macos
    Notes: Standalone curl-installed agy (SigningId=cli, Team EQHXZ8M8AV). Distinct
      from IDE bundle com.google.antigravity.
  - Rank: 2
    Field: process.executable
    Value: '*\.local/bin/agy'
    Reliability: high
    Platforms:
    - macOS
    - Linux
    Notes: Default curl install path on macOS/Linux
  - Rank: 3
    Field: process.executable
    Value: '*\AppData\Local\agy\bin\agy.exe'
    Reliability: high
    Platform: windows
    Notes: Default curl/irm install path on Windows
  - Rank: 4
    Field: process.parent.name
    Value: agy
    Reliability: high
    Platform: all
    Notes: Shell commands spawned from CLI TUI (! prefix or tool execution)
  FalsePositiveGuidance: Homebrew cask `antigravity` also exposes an `agy` shim, but
    it execs Antigravity.app's bundled antigravity binary — corroborate with executable
    path (~/.local/bin/agy vs /Applications/Antigravity.app/...).
- Id: google-antigravity-desktop-attribution
  Name: Antigravity desktop IDE attribution
  AbuseCategory: execution
  AttributionSignals:
  - Rank: 1
    Field: process.code_signature.signing_id
    Value: com.google.antigravity
    Reliability: high
    Platform: macos
  - Rank: 2
    Field: process.parent.name
    Value: Antigravity Helper (Plugin)
    Reliability: medium
    Platform: macos
    Notes: VS Code-style extension host — corroborate with bundle_id and path
  - Rank: 3
    Field: process.args
    Value: '*antigravity*'
    Reliability: medium
    Platform: all
    Notes: language_server_* argv per third-party analysis
  FalsePositiveGuidance: VS Code-style extension host — corroborate with path and
    bundle_id
Coverage:
  Verified: true
  Confidence: high
  ReadinessGrade: A
  LastVerified: '2026-07-19'
  Source: lab + vendor docs
  EmpiricalNotes: 'Prior lab (2026-05): standalone curl agy v1.1.4 codesign Identifier=cli
    Team EQHXZ8M8AV; desktop Antigravity.app com.google.antigravity. 2026-07-19 revalidation:
    agy and Antigravity.app absent on this mac PATH (not reinstalled). Official headless
    flag is -p/--print (not top-level agentapi — internal wrapper only). Homebrew
    cask `antigravity` exposes agy shim that execs IDE bundle binary — corroborate
    executable path. Primary CLI or desktop binary empirically present on lab PATH
    or documented install footprint (2026-07-19 revalidation).'
