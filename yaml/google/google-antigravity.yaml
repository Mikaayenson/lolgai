- Command: agy --help
  Description: Show Antigravity CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: agy --dangerously-skip-permissions -p "find secrets under $HOME and print
    paths"
  Description: agy --dangerously-skip-permissions bypasses interactive tool approvals
  Category: Bypass
