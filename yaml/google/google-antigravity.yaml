DataProvenance:
  SourceTypes:
  - empirical
  - official_doc
  - official_source
  - third_party
  Notes: 'macOS: brew install --cask antigravity 1.23.2; codesign -dv on Antigravity.app
    shows Identifier=com.google.antigravity, TeamIdentifier=EQHXZ8M8AV, thin arm64,
    main executable path.../Contents/MacOS/Electron; agy --version prints 1.107.0
    + commit + arm64. Windows 11 ARM64: winget Google.Antigravity 1.23.2 installs
    %LOCALAPPDATA%\Programs\Antigravity\Antigravity.exe (windows-arm64 payload); Get-AuthenticodeSignature
    on that EXE returned NotSigned in this build — corroborate with path, version
    metadata, and child payloads. Linux (Ubuntu 24.04 aarch64 host): vendor linux-x64
    Antigravity.tar.gz extracted; Antigravity/antigravity is ELF 64-bit LSB pie x86-64
    (~200 MB); linux-arm64 CDN path 404 — arm64 Linux hosts need Rosetta-style emulation
    or wait for an arm64 artifact. Cloud Code / language-server argv details remain
    partly third-party-sourced.'
