Commands:
- Command: local-ai serve
  Description: Start local inference server on localhost
  Category: Local
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: local-ai run llama3.2 "hello"
  Description: Run a local model with a simple prompt (Ollama-style; verify subcommand
    per product)
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: local-ai run --address 0.0.0.0:8080
  Description: LocalAI OpenAI-compatible server on all interfaces
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: 'curl -s http://127.0.0.1:8080/v1/chat/completions -H "Content-Type: application/json"
