Name: LocalAI
Id: localai
Category: local_llm
Vendor: mudler (OSS)
Description: OpenAI-compatible local inference server (`local-ai`). Default subcommand
  is `run`; loads model YAMLs from `--models-path` (not Ollama-style `run model "prompt"`).
Author: Mikaayenson
