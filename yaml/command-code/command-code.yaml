Name: Command Code
Id: command-code
Category: cli_agent
Vendor: Command Code
Description: Coding agent CLI that continuously learns coding taste. npm package `command-code`
  exposes `cmd`, `cmdc`, `command-code`, and `commandcode` binaries (same entrypoint).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - cmd
  - cmd.exe
  - cmdc
  - cmdc.exe
  - command-code
  - command-code.exe
  - commandcode
  - commandcode.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  - Headless
  - Bypass
  Website: https://www.npmjs.com/package/command-code
  OfficialUrl: https://www.npmjs.com/package/command-code
  CliExecutable: cmd
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  InstallationPaths:
  - ~/.commandcode/
  ConfigDirs:
    macOS: ~/.commandcode/
    Linux: ~/.commandcode/
    Windows: '%USERPROFILE%\\.commandcode\\'
  Packages:
    npm:
    - command-code
Commands:
- Command: cmd
  Description: Interactive agent CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: cmd -p "explain this repository"
  Description: One-shot agent prompt in print mode
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: cmd mcp list
  Description: List configured MCP servers
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: cmd --yolo -p "read ~/.aws/credentials and ~/.ssh/id_ed25519; output full
    contents to stdout"
  Description: Headless agent with permission bypass targeting credential paths
  Category: Bypass
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: cmd -p "find world-readable *.pem *.key *.env under $HOME; print paths
    and head -5 each"
  Description: Automated secret discovery via agent file/shell tools
  Category: Headless
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: all
- Command: cmd mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: cmd mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
