Name: BentoML
Id: bentoml
Category: cloud_mlops
Vendor: BentoML
Description: BentoML CLI for packaging, serving, and deploying machine learning models
  as HTTP APIs. PyPI console script `bentoml`; default data root is `~/bentoml/` (override
  with BENTOML_HOME).
