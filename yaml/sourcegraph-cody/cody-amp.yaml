    Notes: Skills (workspaceDir)
  - Path: ~/.config/agents/skills/<name>/SKILL.md
    Notes: Skills (globalDir)
  MCP:
  - Path: amp.mcpServers in ~/.config/amp/settings.json
    Notes: MCP server configuration
  - Path: mcp.json in skill directories
    Notes: MCP server configuration
Signing:
