    Notes: amp.mcpServers and CLI settings
  - Path: AGENTS.md
    Notes: Context/instructions file
  - Path: AGENT.md
    Notes: Context/instructions file
  - Path: CLAUDE.md
    Notes: Context/instructions file
  - Path: .agents/skills/*/SKILL.md
    Notes: Context/instructions file
  - Path: ~/.config/amp/AGENTS.md
    Notes: Context/instructions file
  - Path: ~/.config/AGENTS.md
    Notes: Context/instructions file
  - Path: ~/.config/agents/skills/*/SKILL.md
    Notes: Context/instructions file
  Logs:
