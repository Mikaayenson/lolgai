Name: TRAE
Id: trae
Category: ide_agent
Vendor: ByteDance
Description: ByteDance's AI-native IDE (Electron-based). Multi-LLM (OpenAI, Anthropic,
  Doubao, Azure, Gemini), free tier including GPT-4o, Claude-3.5-Sonnet, DeepSeek.
  SOLO autonomous mode for end-to-end workflows. International (trae.ai) and China
  (trae.cn) variants.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - Trae
  - trae
  - Trae.exe
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Shell
  - MCP
  Website: https://www.trae.ai/
  Framework: electron
  HelperProcesses:
  - Electron
  - Trae Helper
  - Trae Helper (Plugin)
  - Trae Helper (GPU)
  - Trae Helper (Renderer)
  InstallationPaths:
  - /Applications/Trae.app
  - /Applications/Trae.app/Contents/Resources/app/bin/trae
  - ~/Library/Application Support/Trae/
  - ~/.config/Trae/
  - '%APPDATA%\Trae\'
  ContextFiles:
  - .trae/
  ConfigDirs:
    macOS: ~/Library/Application Support/Trae/
    Linux: ~/.config/Trae/
    Windows: '%APPDATA%\Trae\'
  Packages:
    winget:
    - ByteDance.Trae
    brew_cask:
    - trae
Commands:
- Command: trae --goto file.txt:10
  Description: Open file at line via bundled VS Code-style CLI
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: Trae .
  Description: Open project in IDE
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: Trae --help
  Description: Show IDE CLI help
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: open -a Trae --args "$HOME/.ssh"
  Description: Script-launched Trae IDE onto SSH key directory (macOS)
  Category: Execute
  Privileges: User
  MitreID: T1204
  Usage: abuse
  Platform: macOS
- Command: Trae mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: Trae mcp add registers attacker-controlled filesystem MCP server on
    host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
