  Source: pi.dev docs + local `pi --help` v0.80.10 (npm global, 2026-07-19)
  EmpiricalNotes: Lab macOS npm global v0.80.10. `--print`/`-p` headless confirmed;
    built-in bash/read/edit/write tools. No native MCP subcommand — extensions may
    add MCP. Removed MCP capability claim. Primary CLI or desktop binary empirically
    present on lab PATH or documented install footprint (2026-07-19 revalidation).
