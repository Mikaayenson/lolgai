Name: Zed
Id: zed
Category: ide_agent
Vendor: Zed Industries, Inc.
OfficialUrl: https://zed.dev/docs
Description: High-performance AI-native code editor written in Rust (no Electron).
  Agent panel can execute shell commands. First-class MCP support. Reads multiple
  instruction file formats. Parallel Agents feature enables multiple AI agents running
  simultaneously in one editor with threads sidebar, top-down streaming, subagent
  content preview. Supports Opus 4.7, GPT-5.4, Gemini 3.1 Pro, Grok.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
