Name: Text Generation WebUI (oobabooga)
Id: textgen-webui
Category: local_llm
Vendor: oobabooga (OSS)
Description: Python-based local LLM web UI with Gradio frontend. Launched via OS start
  scripts (`start_linux.sh`, `start_macos.sh`, `start_windows.bat`) that bootstrap
  conda and invoke `server.py`. Has built-in tool-calling via user_data/tools/ and
  optional MCP via user_data/mcp.json. Zero telemetry. Git clone only — no PyPI package.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - server.py
  - start_linux.sh
  - start_macos.sh
  - start_windows.bat
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - Local
  - MCP
  Website: https://github.com/oobabooga/text-generation-webui
  OfficialUrl: https://github.com/oobabooga/text-generation-webui
  CliExecutable: server.py
  Framework: python_daemon
  HelperProcesses:
  - python
  - python3
  - llama-server
  InstallationPaths:
  - ~/text-generation-webui/
  - '%USERPROFILE%\text-generation-webui\'
  ConfigDirs:
    macOS: ~/text-generation-webui/user_data/
    Linux: ~/text-generation-webui/user_data/
    Windows: '%USERPROFILE%\text-generation-webui\user_data\'
Commands:
- Command: ./start_linux.sh
  Description: Bootstrap and launch text-generation-webui on localhost (Linux)
  Category: Local
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: python server.py --help
  Description: Show server.py CLI flags
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: ./start_linux.sh --listen --api
  Description: Gradio WebUI with API on all interfaces (Linux script) (Gradio --listen
    binds 0.0.0.0 — unauthenticated LAN access)
  Category: Local
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: Linux
- Command: server.py mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: server.py mcp add registers attacker-controlled filesystem MCP server
    on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
