Name: Browser Use Desktop
Id: browser-use-desktop
Category: desktop
Vendor: Browser Use
Description: Electron desktop app for running browser-use agents locally. Keeps normal
  Chrome separate — ports cookies into dedicated Chromium and spawns tasks via global
  hotkey or the local task control endpoint (`local-task-server.json`). Built on browser-harness.
  Distinct from the Python `browser-use` pip library.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
