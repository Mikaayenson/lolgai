Name: Browser Use Box (BUX)
Id: browser-use-box
Category: cli_agent
Vendor: Browser Use
Description: Self-hosted 24/7 Claude Code + Browser Use stack (browser-use/bux). Installed
  via install.sh on Ubuntu 22.04+ VPS; runs as dedicated `bux` user with systemd units
  bux-browser-keeper and bux-ttyd. Wraps Claude Code CLI with persistent Chromium
  (browser-harness) and optional Telegram control. Not a macOS/Windows desktop app
  — Linux VPS only.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - bux-browser-keeper
  - bux-ttyd
  - claude
  - chromium
  - python3
  Agentic: true
  SpawnsShells: true
  Privileges: User
  SupportedOS:
  - Linux
  Capabilities:
  - Shell
  - MCP
  - Headless
  - Bypass
  Website: https://github.com/browser-use/bux
  OfficialUrl: https://browser-use.com/bux
  CliExecutable: claude
  Framework: python_daemon
  HelperProcesses:
  - python
  - python3
  - node
  InstallationPaths:
  - /home/bux/
  ContextFiles:
  - /home/bux/.claude/
  - /home/bux/skills/
  - agent/CLAUDE.md
  ConfigDirs:
    Linux: /home/bux/
Commands:
- Command: curl -fsSL https://raw.githubusercontent.com/browser-use/bux/main/install.sh
    | sudo BROWSER_USE_API_KEY=bu_xxx bash
  Description: One-line BUX installer on Ubuntu 22.04+ VPS
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: Linux
- Command: systemctl is-active bux-browser-keeper bux-ttyd
  Description: Verify BUX systemd services after install
  Category: Execute
  Privileges: User
  MitreID: T1059
  Usage: normal
  Platform: Linux
- Command: claude --dangerously-skip-permissions -p "use Browser Use to dump session
    cookies to /tmp/c.json"
  Description: Claude Code driving Browser Use for session theft
  Category: Bypass
  Privileges: User
  MitreID: T1185
  Usage: abuse
  Platform: Linux
- Command: claude mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: claude mcp add registers attacker-controlled filesystem MCP server
    on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
