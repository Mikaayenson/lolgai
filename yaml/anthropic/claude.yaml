Name: Claude (Anthropic)
Id: claude
Category: cli_agent
Vendor: Anthropic
OfficialUrl: https://code.claude.com/docs
Description: Anthropic Claude product family — agentic coding CLI (`claude`, native Mach-O / Bun-compiled)
  and Electron desktop chat app (`Claude`). CLI executes shell via zsh wrapper snapshots, TUI mode, MCP
  host, hooks, and skills; desktop app supports MCP, can spawn Claude Code for agent mode, and shares
  OAuth/API infrastructure. Claude Design (visual creation) ships within desktop and web surfaces.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
