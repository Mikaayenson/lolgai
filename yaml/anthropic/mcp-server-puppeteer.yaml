    - '@modelcontextprotocol/server-puppeteer'
Commands:
- Command: npx -y @modelcontextprotocol/server-puppeteer
  Description: Run Puppeteer MCP server over stdio (typical host registration)
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: mcp-server-puppeteer
  Description: Same stdio MCP server when npm global bin is on PATH
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: mcp-server-puppeteer mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
