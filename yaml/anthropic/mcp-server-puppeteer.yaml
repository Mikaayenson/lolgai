Name: MCP Puppeteer Server
Id: mcp-server-puppeteer
Category: mcp
Vendor: Anthropic / MCP
OfficialUrl: https://github.com/modelcontextprotocol/servers/tree/main/src/puppeteer
Description: MCP server for browser automation via headless Chrome/Puppeteer, exposed
  to AI agents over MCP stdio. Published as `@modelcontextprotocol/server-puppeteer`.
  No persistent server config directory — registration lives on the MCP host agent.
Author: Mikaayenson
