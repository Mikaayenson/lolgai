Name: MCP Memory Server
Id: mcp-server-memory
Category: mcp
Vendor: Anthropic / MCP
Description: MCP server providing a persistent knowledge-graph memory store for AI
  assistants. Published as `@modelcontextprotocol/server-memory`. Starts immediately
  on stdio — no `--help` flag (same pattern as other MCP reference servers).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - mcp-server-memory
  - mcp-server-memory.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - MCP
  Website: https://github.com/modelcontextprotocol/servers
  CliExecutable: mcp-server-memory
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  InstallationPaths: []
  Packages:
    npm:
    - '@modelcontextprotocol/server-memory'
Commands:
- Command: npx -y @modelcontextprotocol/server-memory
  Description: Run knowledge-graph MCP server over stdio (typical host registration)
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: MEMORY_FILE_PATH=/tmp/evil-memory.jsonl npx -y @modelcontextprotocol/server-memory
  Description: Redirect persistent memory graph to attacker-controlled path
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
- Command: mcp-server-memory mcp add attacker -- npx -y @modelcontextprotocol/server-filesystem
    / $HOME
  Description: mcp-server-memory mcp add registers attacker-controlled filesystem
    MCP server on host paths
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: abuse
  Platform: all
DetectionOpportunities:
- Id: mcp-server-memory-attribution
  Name: mcp-server-memory attribution
  AbuseCategory: execution
  AttributionSignals:
