    Field: process.name
    Value: mcp-server-memory
    Reliability: high
    Platform: all
  - Rank: 2
    Field: process.parent.name
    Value: node
    Reliability: medium
    Platform: all
    Notes: Often spawned via npx from MCP host (Cursor, Claude Code, VS Code)
  - Rank: 3
    Field: process.command_line
    Value: '*@modelcontextprotocol/server-memory*'
    Reliability: high
    Platform: all
  FalsePositiveGuidance: Expected when an MCP host registers the memory server. Corroborate
