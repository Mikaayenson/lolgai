Name: MCP Postgres Server
Id: mcp-server-postgres
Category: mcp
Vendor: Anthropic / MCP
Description: MCP server that lets AI agents run read-only SQL queries against PostgreSQL
  databases. Published as `@modelcontextprotocol/server-postgres`. First CLI argument
  is the Postgres DSN (no --help subcommand).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
