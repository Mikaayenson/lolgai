Name: MCP Brave Search
Id: mcp-server-brave-search
Category: mcp
Vendor: Anthropic / MCP
Description: MCP server exposing Brave web search to AI agents over stdio. npm package
  `@modelcontextprotocol/server-brave-search`; requires BRAVE_API_KEY. Configuration
  lives on the MCP host agent (Cursor, Claude Code, Goose, etc.), not in a server-side
  config dir.
