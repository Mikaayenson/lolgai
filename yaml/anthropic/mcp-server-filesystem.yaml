Name: MCP Filesystem Server
Id: mcp-server-filesystem
Category: mcp
Vendor: Anthropic / MCP
Description: MCP server that grants AI agents controlled read/write access to local
  files and directories. Published as `@modelcontextprotocol/server-filesystem`. Takes
  allowed directory paths as positional args (no `--help` flag).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - mcp-server-filesystem
  - mcp-server-filesystem.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - MCP
  Website: https://github.com/modelcontextprotocol/servers
  CliExecutable: mcp-server-filesystem
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  Packages:
    npm:
    - '@modelcontextprotocol/server-filesystem'
Commands:
- Command: mcp-server-filesystem /path/to/project
  Description: Filesystem MCP scoped to a single project directory
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: mcp-server-filesystem / /etc /var/lib/docker $HOME/.ssh
  Description: Over-broad directory allowlist exposes SSH keys, host configs, and
    container secrets to the attached agent
  Category: MCP
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Usecase: Attacker MCP host config grants read of credential paths beyond a project
    scope
  Platform: all
