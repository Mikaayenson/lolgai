    Platform: all
  - Rank: 2
    Field: process.parent.name
    Value: node
    Reliability: medium
    Platform: all
    Notes: Often spawned via npx from MCP host (Cursor, Claude Code, etc.)
  FalsePositiveGuidance: Expected when an MCP host registers the filesystem server.
    Corroborate with argv directory list and parent agent process.
