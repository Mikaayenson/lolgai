Name: ExLlama
Id: exllama
Category: local_llm
Vendor: turboderp (OSS)
Description: ExLlama v1 GPTQ inference library (GitHub turboderp/exllama). PyPI `exllama`
  is a library import — lab installer adds an `exllama` shim, not an Ollama-style
  CLI. Inference UIs are repo scripts such as `webui/app.py` (Flask) run via python
  from a cloned checkout.
