Name: Windsurf
Id: windsurf
Category: ide_agent
Vendor: Cognition (formerly Codeium / Exafunction)
Description: Electron VS Code fork by Codeium, acquired by Cognition (makers of Devin).
  'Cascade' is the brand name for Windsurf's in-IDE AI agent. Adaptive model router
  intelligently selects best model per task. Supports Claude Opus 4.6, GPT-5.4, GPT-5.3-Codex,
  Gemini 3.1 Pro. Task queue and background agent features show Devin integration.
  1M+ active users. Shell wrapper uses zsh -l (login shell).
Author: Mikaayenson
