Name: MCP SQLite Server
Id: mcp-server-sqlite
Category: mcp
Vendor: Community / MCP
Description: MCP server for SQLite operations (`mcp-server-sqlite` npm; PyPI 0.0.2).
  Attaches to a database file via `--db` / `--database` or `SQLITE_DB_PATH` env var;
  exposes SQL read/write to MCP hosts.
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
  Binaries:
  - mcp-server-sqlite
  - mcp-server-sqlite.exe
  Agentic: false
  SpawnsShells: false
  Privileges: User
  SupportedOS:
  - macOS
  - Linux
  - Windows
  Capabilities:
  - MCP
  Website: https://www.npmjs.com/package/mcp-server-sqlite
  CliExecutable: mcp-server-sqlite
  Framework: node_cli
  HelperProcesses:
  - node
  - node.exe
  Packages:
    npm:
    - mcp-server-sqlite
    pip:
    - mcp-server-sqlite
Commands:
- Command: mcp-server-sqlite --help
  Description: Show MCP SQLite server CLI help
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: mcp-server-sqlite --db ./app.db
  Description: Attach MCP server to a project database (typical dev setup)
  Category: MCP
  Privileges: User
  MitreID: T1106
  Usage: normal
  Platform: all
- Command: mcp-server-sqlite --db ~/.config/google-chrome/Default/Cookies
  Description: Attach MCP server to browser cookie SQLite — agent can query session
    tokens
  Category: MCP
  Privileges: User
  MitreID: T1539
  Usage: abuse
  Platform: all
- Command: mcp-server-sqlite --db /var/lib/docker/volumes/*/database.db
  Description: Point MCP at Docker volume SQLite stores containing application secrets
  Category: MCP
  Privileges: User
  MitreID: T1005
  Usage: abuse
  Platform: Linux
