Name: ChatGPT CLI
Id: chatgpt-cli
Category: chat_cli
Vendor: Community / transitive-bullshit
Description: Community terminal client for the ChatGPT API (`chatgpt` on npm). Runs
  prompts from the shell and caches responses locally — not an OpenAI official product.
  Repo renamed to transitive-bullshit/agentic (npm package name unchanged).
