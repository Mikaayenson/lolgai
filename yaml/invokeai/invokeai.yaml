Name: InvokeAI
Id: invokeai
Category: image_gen
Vendor: InvokeAI
Description: Creative image generation platform. CLI entrypoints include `invokeai`
  (installer) and `invokeai-web` (web UI server).
Author: Mikaayenson
Created: '2026-07-18'
LastModified: '2026-07-19'
Details:
